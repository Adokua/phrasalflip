<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PhrasalFlip">
<meta name="theme-color" content="#080c14">
<meta name="description" content="영어 구동사 플래시카드 학습 앱">
<title>PhrasalFlip</title>

<!-- PWA Manifest -->
<link rel="manifest" href="./manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c14;--s1:#0f1520;--s2:#151d2e;--s3:#1c2640;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#4fc3f7;--gold:#f4c542;--red:#ff6b6b;--green:#56e39f;
  --text:#e8ecf4;--dim:#6b7a99;--dim2:#8a9ab8;
  --lv1:#56e39f;--lv2:#4fc3f7;--lv3:#f4c542;--lv4:#ff6b6b;
  --card-w:min(92vw,420px);--card-h:300px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 10% 10%,rgba(79,195,247,.05) 0%,transparent 60%),
    radial-gradient(ellipse 60% 60% at 90% 90%,rgba(86,227,159,.04) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

/* HEADER */
header{
  width:100%;max-width:480px;padding:18px 18px 0;
  display:flex;justify-content:space-between;align-items:center;
  position:relative;z-index:2;flex-shrink:0;
}
.logo{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;letter-spacing:-1px;}
.logo em{color:var(--accent);font-style:normal;}
.hbtns{display:flex;gap:8px;}
.hbtn{
  background:var(--s1);border:1px solid var(--border2);color:var(--dim2);
  border-radius:10px;padding:7px 11px;font-size:16px;cursor:pointer;
  transition:all .2s;
}
.hbtn:active{background:var(--s2);color:var(--text);}

/* LEVEL TABS */
.lvl-row{
  display:flex;gap:6px;padding:14px 18px 0;
  width:100%;max-width:480px;position:relative;z-index:2;flex-shrink:0;
}
.lvl-tab{
  flex:1;border:none;border-radius:10px;padding:8px 0;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;letter-spacing:.3px;
  background:var(--s1);color:var(--dim);border:1px solid var(--border);
}
.lvl-tab.active{color:#000;}
.lvl-tab[data-lv="1"].active{background:var(--lv1);}
.lvl-tab[data-lv="2"].active{background:var(--lv2);}
.lvl-tab[data-lv="3"].active{background:var(--lv3);}
.lvl-tab[data-lv="4"].active{background:var(--lv4);}
.lvl-tab[data-lv="all"].active{background:var(--text);color:#000;}

/* PROGRESS */
.prog-wrap{
  width:100%;max-width:480px;padding:12px 18px 0;
  position:relative;z-index:2;flex-shrink:0;
}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:6px;font-weight:500;}
/* 진행률 바 두껍게 (#10) */
.prog-bar{width:100%;height:7px;background:var(--s2);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .5s ease;background:linear-gradient(90deg,var(--accent),#a8edea);}
.stats-row{display:flex;gap:8px;margin-top:10px;}
.chip{
  display:flex;align-items:center;gap:5px;
  background:var(--s1);border:1px solid var(--border);
  border-radius:20px;padding:4px 10px;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s;
}
.chip:active{transform:scale(.95);}
.chip.chip-active-know{background:rgba(86,227,159,.15);border-color:rgba(86,227,159,.4);color:var(--green);}
.chip.chip-active-unk{background:rgba(255,107,107,.15);border-color:rgba(255,107,107,.4);color:var(--red);}
.dot{width:7px;height:7px;border-radius:50%;}
.dg{background:var(--green);} .dr{background:var(--red);}

/* 스트릭 (#14) */
.streak-badge{
  display:flex;align-items:center;gap:4px;
  background:var(--s1);border:1px solid var(--border);
  border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;
  color:var(--gold);cursor:default;
}

/* 요약 시트 (#13) */
.summary-ov{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:130;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(6px);
}
.summary-ov.open{display:flex;}
.summary-sheet{
  background:var(--s1);border:1px solid var(--border2);
  border-radius:24px 24px 0 0;padding:24px 22px 44px;
  width:100%;max-width:480px;animation:slideUp .3s ease;
  text-align:center;
}
.summary-emoji{font-size:52px;margin-bottom:8px;}
.summary-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;margin-bottom:4px;}
.summary-sub{font-size:13px;color:var(--dim);margin-bottom:18px;}
.summary-stats{display:flex;gap:12px;justify-content:center;margin-bottom:20px;}
.summary-stat{
  background:var(--s2);border:1px solid var(--border);
  border-radius:14px;padding:12px 20px;
  display:flex;flex-direction:column;align-items:center;gap:3px;min-width:80px;
}
.summary-stat-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;}
.summary-stat-lbl{font-size:11px;color:var(--dim);font-weight:500;}
.summary-btns{display:flex;gap:10px;}
.summary-btn1{
  flex:1;padding:14px;background:var(--accent);color:#000;
  border:none;border-radius:14px;font-size:14px;font-weight:700;
  font-family:'DM Sans',sans-serif;cursor:pointer;
}
.summary-btn2{
  flex:1;padding:14px;background:transparent;color:var(--dim);
  border:1px solid var(--border);border-radius:14px;font-size:14px;
  font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;
}

/* CARD */
.card-wrap{
  position:relative;z-index:2;
  flex:1;height:var(--card-h);
  perspective:1200px;cursor:pointer;flex-shrink:0;
}
.card-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
}
.card-inner.flipped{transform:rotateY(180deg);}
.face{
  position:absolute;inset:0;backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:22px;border:1px solid var(--border2);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:22px 20px;gap:6px;
  overflow:hidden;transition:border-color .3s, box-shadow .3s;
}
/* 상태별 테두리 */
.card-inner.st-know .face{
  border-color:rgba(86,227,159,.55);
  box-shadow:0 0 0 1px rgba(86,227,159,.2), inset 0 0 40px rgba(86,227,159,.04);
}
.card-inner.st-unknown .face{
  border-color:rgba(255,107,107,.55);
  box-shadow:0 0 0 1px rgba(255,107,107,.2), inset 0 0 40px rgba(255,107,107,.04);
}
.front{
  background:var(--s1);
  background-image:radial-gradient(ellipse at top left,rgba(79,195,247,.08) 0%,transparent 55%);
}
.back{
  background:var(--s2);transform:rotateY(180deg);
  background-image:radial-gradient(ellipse at bottom right,rgba(86,227,159,.07) 0%,transparent 55%);
}
.lv-badge{
  font-size:10px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;border-radius:6px;padding:3px 9px;margin-bottom:2px;
}
.lv-badge[data-lv="1"]{background:rgba(86,227,159,.15);color:var(--lv1);}
.lv-badge[data-lv="2"]{background:rgba(79,195,247,.15);color:var(--lv2);}
.lv-badge[data-lv="3"]{background:rgba(244,197,66,.15);color:var(--lv3);}
.lv-badge[data-lv="4"]{background:rgba(255,107,107,.15);color:var(--lv4);}
.card-word{
  font-family:'Playfair Display',serif;font-size:36px;font-weight:700;
  text-align:center;line-height:1.1;color:var(--text);
}
/* 카테고리 태그 시인성 (#9) */
.card-cat{
  font-size:11px;font-weight:700;letter-spacing:.5px;
  margin-top:2px;padding:2px 10px;border-radius:20px;
  background:var(--s3);color:var(--dim2);border:1px solid var(--border2);
}

.flip-hint{font-size:11px;color:var(--dim);margin-top:8px;display:flex;align-items:center;gap:3px;opacity:.6;}

/* 버튼 dimmed — 앞면일 때 (#3) */
.action-area{
  display:flex;gap:12px;margin-top:14px;
  position:relative;z-index:2;width:min(98vw,460px);flex-shrink:0;
  transition:opacity .25s;
}
.action-area.dim{opacity:.35;pointer-events:none;}
.abtn{
  flex:1;border:none;border-radius:16px;padding:14px 0;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;
  justify-content:center;gap:7px;letter-spacing:.3px;
}
.btn-know{background:rgba(86,227,159,.12);color:var(--green);border:1px solid rgba(86,227,159,.28);}
.btn-know:active{background:rgba(86,227,159,.28);transform:scale(.97);}
.btn-unknown{background:rgba(255,107,107,.12);color:var(--red);border:1px solid rgba(255,107,107,.28);}
.btn-unknown:active{background:rgba(255,107,107,.28);transform:scale(.97);}

/* 카드 앞면 버튼 dimmed 힌트 */
.flip-needed{
  font-size:11px;color:var(--dim);margin-top:2px;
  display:flex;align-items:center;gap:4px;opacity:.7;
}

.back-tag{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:6px;padding:3px 9px;background:rgba(86,227,159,.12);color:var(--green);}
.card-meaning{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;text-align:center;color:var(--text);line-height:1.3;}
.card-example{font-size:13px;color:var(--dim2);text-align:center;line-height:1.6;font-style:italic;padding:0 4px;}
.card-example strong{color:var(--accent);font-style:normal;}
.card-example-ko{font-size:12px;color:var(--dim);text-align:center;line-height:1.5;padding:0 4px;margin-top:-2px;}

/* TTS BUTTON */
.tts-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(79,195,247,.1);border:1px solid rgba(79,195,247,.25);
  color:var(--accent);border-radius:20px;padding:6px 14px;
  font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all .2s;margin-top:4px;
}
.tts-btn:active{background:rgba(79,195,247,.25);transform:scale(.96);}
.tts-btn.speaking{background:rgba(79,195,247,.2);animation:pulse .8s ease infinite alternate;}
@keyframes pulse{from{opacity:.7}to{opacity:1}}
.card-row{
  display:flex;align-items:center;gap:8px;
  margin-top:14px;position:relative;z-index:2;flex-shrink:0;
  width:min(98vw,460px);
}
.side-btn{
  background:var(--s1);border:1px solid var(--border2);color:var(--dim2);
  border-radius:14px;padding:14px 10px;font-size:22px;cursor:pointer;
  transition:all .2s;flex-shrink:0;line-height:1;
  height:72px;display:flex;align-items:center;justify-content:center;
}
.side-btn:active{background:var(--s2);color:var(--text);transform:scale(.92);}
.counter-top{
  position:absolute;top:12px;right:14px;
  font-size:12px;color:var(--dim2);font-weight:600;
  background:var(--s2);border:1px solid var(--border);
  border-radius:20px;padding:3px 10px;z-index:3;
  cursor:pointer;transition:all .2s;
  font-family:'DM Sans',sans-serif;
}
.counter-top:active{background:var(--accent);color:#000;border-color:var(--accent);transform:scale(.94);}

/* MODE TABS */
.mode-tabs{
  display:flex;gap:6px;background:var(--s1);border:1px solid var(--border);
  border-radius:14px;padding:4px;margin-top:12px;position:relative;z-index:2;
  width:min(98vw,460px);flex-shrink:0;
}
.mtab{
  flex:1;padding:7px 0;border:none;background:transparent;
  color:var(--dim);font-family:'DM Sans',sans-serif;font-size:12px;
  font-weight:600;border-radius:10px;cursor:pointer;transition:all .2s;
}
.mtab.active{background:var(--s2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3);}

/* SUB-LEVEL SELECTOR */
.sublv-row{
  display:none;
  gap:6px;margin-top:8px;position:relative;z-index:2;
  width:min(98vw,460px);flex-shrink:0;
  animation:fadeIn .2s ease;
}
.sublv-row.visible{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.sublv-label{
  font-size:11px;color:var(--dim);font-weight:600;
  white-space:nowrap;align-self:center;padding-left:2px;
}
.sublv-btn{
  flex:1;padding:6px 0;border:1px solid var(--border);background:var(--s1);
  color:var(--dim);font-family:'DM Sans',sans-serif;font-size:11px;
  font-weight:700;border-radius:10px;cursor:pointer;transition:all .2s;
}
.sublv-btn.active{color:#000;}
.sublv-btn[data-sl="all"].active{background:var(--text);border-color:var(--text);}
.sublv-btn[data-sl="1"].active{background:var(--lv1);border-color:var(--lv1);}
.sublv-btn[data-sl="2"].active{background:var(--lv2);border-color:var(--lv2);}
.sublv-btn[data-sl="3"].active{background:var(--lv3);border-color:var(--lv3);}
.sublv-btn[data-sl="4"].active{background:var(--lv4);border-color:var(--lv4);}
.sublv-btn:active{transform:scale(.95);}

/* STUDY LOG */
.log-ov{
  display:none;position:fixed;inset:0;background:var(--bg);
  z-index:115;flex-direction:column;align-items:center;
}
.log-ov.open{display:flex;}
.log-header{
  width:100%;max-width:520px;padding:20px 18px 0;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
}
.log-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;}
.log-title span{color:var(--accent);}
.log-close{
  background:var(--s1);border:1px solid var(--border2);color:var(--dim2);
  border-radius:10px;padding:8px 14px;font-size:14px;font-weight:600;
  font-family:'DM Sans',sans-serif;cursor:pointer;
}
.log-tabs{
  display:flex;gap:6px;background:var(--s1);border:1px solid var(--border);
  border-radius:14px;padding:4px;margin:12px 18px 0;
  width:calc(100% - 36px);max-width:484px;flex-shrink:0;
}
.log-tab{
  flex:1;padding:7px 0;border:none;background:transparent;
  color:var(--dim);font-family:'DM Sans',sans-serif;font-size:12px;
  font-weight:600;border-radius:10px;cursor:pointer;transition:all .2s;
}
.log-tab.active{background:var(--s2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3);}
.log-list{
  width:100%;max-width:520px;padding:10px 18px 30px;
  overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:12px;
}
.log-list::-webkit-scrollbar{width:4px;}
.log-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.log-day{
  background:var(--s1);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;
}
.log-day-header{
  padding:14px 16px;display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;
}
.log-day-date{font-size:14px;font-weight:700;}
.log-day-stats{display:flex;gap:8px;font-size:12px;}
.log-stat-done{color:var(--green);font-weight:600;}
.log-stat-rev{color:var(--red);font-weight:600;}
.log-day-body{padding:0 16px 14px;display:none;flex-direction:column;gap:8px;}
.log-day-body.open{display:flex;}
.log-section-title{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--dim);margin-top:4px;}
.log-word-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.log-word{
  font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;
}
.log-word.know{background:rgba(86,227,159,.12);color:var(--green);border:1px solid rgba(86,227,159,.25);}
.log-word.unk{background:rgba(255,107,107,.12);color:var(--red);border:1px solid rgba(255,107,107,.25);}
.log-empty{text-align:center;padding:60px 0;color:var(--dim);font-size:14px;line-height:1.8;}

/* SWIPE HINT */
.swipe-hint{
  font-size:11px;color:var(--dim);margin-top:8px;
  position:relative;z-index:2;flex-shrink:0;
  display:flex;gap:14px;
}
.swipe-hint span{display:flex;align-items:center;gap:4px;}

/* MODAL */
.modal-ov{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:100;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(6px);
}
.modal-ov.open{display:flex;}
.modal{
  background:var(--s1);border:1px solid var(--border2);
  border-radius:26px 26px 0 0;padding:24px 22px 40px;
  width:100%;max-width:480px;animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:38px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 20px;}
.mtitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:18px;}
.srow{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);}
.slabel{font-size:14px;font-weight:500;}.ssub{font-size:11px;color:var(--dim);margin-top:2px;}
.toggle{width:46px;height:26px;background:var(--s2);border:1px solid var(--border2);border-radius:99px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--accent);border-color:var(--accent);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.toggle.on::after{transform:translateX(20px);}
.tinput{background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:7px 10px;font-size:14px;font-family:'DM Sans',sans-serif;width:95px;text-align:center;}
.save-btn{width:100%;margin-top:18px;padding:15px;background:var(--accent);color:#000;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.note-box{background:rgba(79,195,247,.06);border:1px solid rgba(79,195,247,.2);border-radius:12px;padding:12px;margin-top:14px;font-size:12px;color:var(--dim);line-height:1.6;}

/* VIEW PICKER */
.vpicker-ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);z-index:120;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);
}
.vpicker-ov.open{display:flex;}
.vpicker-sheet{
  background:var(--s1);border:1px solid var(--border2);
  border-radius:24px 24px 0 0;padding:20px 20px 40px;
  width:100%;max-width:480px;animation:slideUp .28s ease;
}
.vpicker-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 18px;}
.vpicker-title{font-size:14px;color:var(--dim);text-align:center;margin-bottom:14px;font-weight:500;}
.vpicker-btns{display:flex;gap:10px;}
.vpicker-btn{
  flex:1;border:1px solid var(--border2);border-radius:16px;
  padding:16px 10px;background:var(--s2);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;transition:all .2s;
}
.vpicker-btn:active{transform:scale(.97);}
.vpicker-icon{font-size:28px;}
.vpicker-label{font-size:13px;font-weight:700;color:var(--text);}
.vpicker-sub{font-size:11px;color:var(--dim);}
.vpicker-cancel{
  width:100%;margin-top:10px;padding:12px;
  background:transparent;border:1px solid var(--border);
  color:var(--dim);border-radius:14px;font-size:14px;
  font-family:'DM Sans',sans-serif;cursor:pointer;
}

/* ── VOCAB OVERLAY ── */
.vocab-ov{
  display:none;position:fixed;inset:0;
  background:var(--bg);z-index:110;
  flex-direction:column;align-items:center;
}
.vocab-ov.open{display:flex;}

.vocab-header{
  width:100%;max-width:520px;
  padding:20px 18px 0;
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.vocab-title{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:900;letter-spacing:-.5px;
}
.vocab-title span{color:var(--accent);}
.vocab-close{
  background:var(--s1);border:1px solid var(--border2);
  color:var(--dim2);border-radius:10px;padding:8px 14px;
  font-size:14px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .2s;
}
.vocab-close:active{background:var(--s2);color:var(--text);}

.vocab-filters{
  width:100%;max-width:520px;
  padding:14px 18px 0;
  display:flex;gap:8px;flex-shrink:0;
}
.vf-btn{
  border:1px solid var(--border);background:var(--s1);
  color:var(--dim);border-radius:20px;padding:6px 14px;
  font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:5px;
}
.vf-btn.active{color:#000;}
.vf-btn[data-f="all"].active{background:var(--text);border-color:var(--text);}
.vf-btn[data-f="know"].active{background:var(--green);border-color:var(--green);}
.vf-btn[data-f="unknown"].active{background:var(--red);border-color:var(--red);}
.vf-btn[data-f="none"].active{background:var(--dim2);border-color:var(--dim2);}

.vocab-lv-row{
  width:100%;max-width:520px;
  padding:10px 18px 0;
  display:flex;gap:6px;flex-shrink:0;
}
.vlv-btn{
  flex:1;border:1px solid var(--border);background:var(--s1);
  color:var(--dim);border-radius:10px;padding:7px 0;
  font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all .2s;
}
.vlv-btn.active{color:#000;}
.vlv-btn[data-lv="all"].active{background:var(--text);border-color:var(--text);}
.vlv-btn[data-lv="1"].active{background:var(--lv1);border-color:var(--lv1);}
.vlv-btn[data-lv="2"].active{background:var(--lv2);border-color:var(--lv2);}
.vlv-btn[data-lv="3"].active{background:var(--lv3);border-color:var(--lv3);}
.vlv-btn[data-lv="4"].active{background:var(--lv4);border-color:var(--lv4);}

.vocab-count{
  width:100%;max-width:520px;
  padding:10px 18px 0;
  font-size:12px;color:var(--dim);
  flex-shrink:0;
}

.vocab-list{
  width:100%;max-width:520px;
  padding:10px 18px 20px;
  overflow-y:auto;flex:1;
  display:flex;flex-direction:column;gap:8px;
}
.vocab-list::-webkit-scrollbar{width:4px;}
.vocab-list::-webkit-scrollbar-track{background:transparent;}
.vocab-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

.vcard{
  background:var(--s1);border:1px solid var(--border);
  border-radius:16px;padding:14px 16px;
  display:flex;align-items:flex-start;gap:12px;
  transition:border-color .2s;
}
.vcard.status-know{border-left:3px solid var(--green);}
.vcard.status-unknown{border-left:3px solid var(--red);}
.vcard.status-none{border-left:3px solid var(--border2);}
.vcard:active{border-color:var(--border2);}

.vstatus{
  flex-shrink:0;margin-top:2px;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
  cursor:pointer;transition:all .18s;
  border:none;background:none;padding:0;
}
.vstatus:active{transform:scale(.85);}
.vstatus.know{background:rgba(86,227,159,.15);color:var(--green);border:1.5px solid rgba(86,227,159,.4);}
.vstatus.unknown{background:rgba(255,107,107,.15);color:var(--red);border:1.5px solid rgba(255,107,107,.4);}
.vstatus.none{background:var(--s2);color:var(--dim);border:1.5px solid var(--border2);}
.vstatus-tooltip{
  font-size:10px;color:var(--dim);text-align:center;margin-top:3px;
  white-space:nowrap;
}

.vbody{flex:1;min-width:0;}
.vword-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.vword{
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:6px;
}
.vword-num{
  font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;
  color:var(--dim2);letter-spacing:0.5px;
  display:inline-flex;align-items:center;justify-content:center;
  min-width:28px;height:24px;
  background:rgba(138,154,184,.08);
  border:1px solid rgba(138,154,184,.2);
  border-radius:6px;
  flex-shrink:0;
}
.vlv-chip{
  font-size:9px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;border-radius:5px;padding:2px 7px;
}
.vlv-chip[data-lv="1"]{background:rgba(86,227,159,.12);color:var(--lv1);}
.vlv-chip[data-lv="2"]{background:rgba(79,195,247,.12);color:var(--lv2);}
.vlv-chip[data-lv="3"]{background:rgba(244,197,66,.12);color:var(--lv3);}
.vlv-chip[data-lv="4"]{background:rgba(255,107,107,.12);color:var(--lv4);}
.vcat{font-size:10px;color:var(--dim);margin-left:auto;}

.vmeaning{
  font-size:14px;font-weight:600;color:var(--dim2);
  margin-top:4px;
}
.vex{
  font-size:12px;color:var(--dim);font-style:italic;
  margin-top:3px;line-height:1.5;
}
.vex b{color:var(--accent);font-style:normal;}
.vex-ko{
  font-size:11px;color:var(--dim);margin-top:1px;line-height:1.4;
}
.vspeakbtn{
  flex-shrink:0;margin-top:2px;
  background:transparent;border:none;
  color:var(--dim);font-size:16px;cursor:pointer;
  padding:4px;border-radius:8px;transition:all .2s;
}
.vspeakbtn:active{color:var(--accent);}
/* 여기서 시작 버튼 */
.vstart-btn{
  flex-shrink:0;align-self:center;
  background:var(--s2);border:1px solid var(--border2);
  color:var(--dim2);font-size:10px;font-weight:700;
  font-family:'DM Sans',sans-serif;letter-spacing:.3px;
  padding:5px 9px;border-radius:10px;cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.vstart-btn:active{background:var(--accent);color:#000;border-color:var(--accent);transform:scale(.95);}

.vocab-header-stats{
  display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;
}
.vhs-chip{
  font-size:11px;font-weight:600;border-radius:20px;
  padding:3px 9px;display:flex;align-items:center;gap:4px;
}
.vhs-chip.know{background:rgba(86,227,159,.15);color:var(--green);}
.vhs-chip.unk{background:rgba(255,107,107,.15);color:var(--red);}
.vhs-chip.none{background:var(--s2);color:var(--dim);border:1px solid var(--border2);}

/* TOAST */
.toast{
  position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--s2);border:1px solid var(--border2);color:var(--text);
  padding:10px 18px;border-radius:14px;font-size:13px;font-weight:500;z-index:200;
  transition:transform .3s ease;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* CARD ANIMATIONS */
@keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.card-wrap{animation:cardIn .3s ease;}
.go-left{animation:goLeft .28s ease forwards;}
.go-right{animation:goRight .28s ease forwards;}
.mark-know{animation:markKnow .28s ease forwards;}
.mark-unk{animation:markUnk .28s ease forwards;}
@keyframes goLeft{to{opacity:0;transform:translateX(-55px)}}
@keyframes goRight{to{opacity:0;transform:translateX(55px)}}
@keyframes markKnow{to{opacity:0;transform:translateX(55px) scale(.95)}}
@keyframes markUnk{to{opacity:0;transform:translateX(-55px) scale(.95)}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- HEADER -->
<header>
  <div class="logo">Phrasal<em>Flip</em></div>
  <div class="hbtns">
    <div class="streak-badge" id="streakBadge" title="연속 학습일">🔥 <span id="streakDays">0</span>일</div>

    <button class="hbtn" onclick="openVocab()" title="단어장">📖</button>

</header>

<!-- LEVEL TABS -->

  </div>

  <div class="stats-row">
    <div class="chip" id="chipKnow" onclick="toggleChipMode('know')"><div class="dot dg"></div><span id="knowCnt">0</span> 완료</div>
    <div class="chip" id="chipUnk" onclick="toggleChipMode('unknown')"><div class="dot dr"></div><span id="unkCnt">0</span> 복습</div>
    <div class="chip" id="remainChip" style="margin-left:auto;cursor:default">남은 <span id="remainCnt">600</span></div>
  </div>
</div>

<!-- Firebase 로딩 화면 -->
<div id="fbLoading" style="position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;">
  <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--text);">Phrasal<em style="color:var(--accent);font-style:normal;">Flip</em></div>
  <div style="width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;"></div>
  <div style="font-size:12px;color:var(--dim);">동기화 중...</div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<!-- CARD ROW: side buttons + card -->
<div class="card-row">
  <button class="side-btn" onclick="prevCard()">‹</button>
  <div class="card-wrap" id="cardWrap" onclick="handleCardTap(event)">
    <button class="counter-top" id="counter" onclick="openVocabAtCurrent()" title="단어장에서 현재 카드 보기">1 / 200</button>
    <div class="card-inner" id="cardInner">
      <div class="face front">
        <div class="lv-badge" id="fBadge" data-lv="1">LV.1 · 기초</div>

        <div class="flip-hint">🔄 탭하면 뜻 보기</div>
      </div>
      <div class="face back">
        <div class="back-tag">뜻</div>
        <div class="card-meaning" id="bMeaning">—</div>
        <div class="card-example" id="bExample"></div>
        <div class="card-example-ko" id="bExampleKo"></div>
        <button class="tts-btn" id="ttsBack" onclick="speakExample(event)">🔊 예문 듣기</button>
      </div>
    </div>
  </div>
  <button class="side-btn" onclick="nextCard()">›</button>
</div>

<!-- ACTIONS -->
<div class="action-area" id="actionArea">
  <button class="abtn btn-know" onclick="markCard(true)">완료</button>
  <button class="abtn btn-unknown" onclick="markCard(false)">복습</button>

<!-- MODE TABS -->
<div class="mode-tabs">
  <button class="mtab active" onclick="setMode('all')">전체</button>

</div>

<!-- SUB-LEVEL SELECTOR (복습/랜덤 선택 시 표시) -->
<div class="sublv-row" id="sublvRow">

  <button class="sublv-btn active" data-sl="all" onclick="setSubLevel('all')">ALL</button>
  <button class="sublv-btn" data-sl="1" onclick="setSubLevel('1')">LV.1</button>
  <button class="sublv-btn" data-sl="2" onclick="setSubLevel('2')">LV.2</button>
  <button class="sublv-btn" data-sl="3" onclick="setSubLevel('3')">LV.3</button>

<!-- VIEW PICKER -->

        <div class="vpicker-sub">플래시카드 방식</div>
      </div>
      <div class="vpicker-btn" onclick="vpickerSelect('vocab')">
        <div class="vpicker-icon">📖</div>
        <div class="vpicker-label">단어장으로 보기</div>

        ↺ 초기화
      </button>
    </div>
<script type="module">

  apiKey: "AIzaSyBeE5xE3PhGD1O3QIyrIo6CcwKPgw-QYHI",
  authDomain: "phrasalflip-1b79f.firebaseapp.com",
  projectId: "phrasalflip-1b79f",
  storageBucket: "phrasalflip-1b79f.firebasestorage.app",
  messagingSenderId: "944035035021",
  appId: "1:944035035021:web:41160f690ca36df95defc4"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth = getAuth(app);

// 전역 노출 — 메인 스크립트에서 사용
window._fbDb  = db;
window._fbDoc = doc;
window._fbSet = setDoc;
window._fbGet = getDoc;
window._fbUid = null;

onAuthStateChanged(auth, async (user) => {
  if (user) {
    window._fbUid = user.uid;
    // Firebase에서 데이터 로드 후 앱 초기화

    const ref = window._fbDoc(window._fbDb, "users", window._fbUid);
    const snap = await window._fbGet(ref);
    if(snap.exists()){
      const d = snap.data();
      if(d.results)  results = d.results;
      if(d.posMap)   posMap  = d.posMap;
      if(d.streak)   _fbStreak = d.streak;
      if(d.log)      _fbLog    = d.log;
      curLevel='all'; curMode='all';
      const pos = d.pos || {};
      if(pos.cardId !== undefined) _savedCardId = pos.cardId;
      else if(pos.idx !== undefined) _savedIdx = pos.idx;
    }
  } catch(e){ console.warn("Firebase 로드 실패, 로컬 사용:", e); }

  // 로딩 화면 숨기기
  document.getElementById('fbLoading')?.remove();

  // UI 초기화
  document.querySelectorAll('.lvl-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.lvl-tab[data-lv="all"]').classList.add('active');
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.mtab')[0].classList.add('active');
  document.getElementById('sublvRow')?.classList.remove('visible');

  buildDeck(); renderCard(false); loadStreak();
};

// Firebase에 저장하는 공통 함수
async function _fbSave(data){
  if(!window._fbUid) return;
  try {
    const ref = window._fbDoc(window._fbDb, "users", window._fbUid);
    await window._fbSet(ref, data, {merge:true});
  } catch(e){ console.warn("Firebase 저장 실패:", e); }
}

async function loadData(){
  // Firebase 인증 전엔 아무것도 안 함 (_fbLoadAndInit이 담당)
}

async function save(){
  await _fbSave({ results });

async function savePos(){
  const cardId = deck[curIdx] ?? 0;
  posMap[posKey()] = curIdx;

// DECK
// ═══════════════════════════════════════════════
function buildDeck(){
  let pool=CARDS.map((_,i)=>i);
  if(curLevel!=='all') pool=pool.filter(i=>CARDS[i].lv===curLevel);
  if(curMode==='unknown') pool=pool.filter(i=>results[i]===false); // 복습 표시된 것만
  if(curMode==='know')    pool=pool.filter(i=>results[i]===true);
  // 랜덤 = 미확인 + 복습 섞기
  if(curMode==='random'){
    pool=pool.filter(i=>results[i]===false||results[i]===undefined);
    pool=pool.sort(()=>Math.random()-.5);
  }
  deck=pool;
  if(deck.length===0){
    if(curMode==='unknown') showToast('복습할 카드가 없어요! ✓');
    else showToast('해당 카드가 없어요!');
    deck=CARDS.map((_,i)=>i).filter(i=>curLevel==='all'||CARDS[i].lv===curLevel);
  }
  // 위치 복원: cardId 우선 → _savedIdx → posMap
  if(_savedCardId>=0){
    const pos=deck.indexOf(_savedCardId);
    curIdx = pos>=0 ? pos : 0;
    _savedCardId=-1;
  } else if(_savedIdx>0 && _savedIdx<deck.length){
    curIdx=_savedIdx;
    _savedIdx=0;
  } else {
    const saved = posMap[posKey()];
    curIdx = (saved>0 && saved<deck.length) ? saved : 0;
  }
}

function renderCard(anim){
  const ci=deck[curIdx], c=CARDS[ci];
  const badge=document.getElementById('fBadge');
  badge.textContent=`LV.${c.lv} · ${['기초','초중급','중급','고급'][c.lv-1]}`;
  badge.dataset.lv=c.lv;
  document.getElementById('fWord').textContent=c.w;
  document.getElementById('fCat').textContent='#'+c.cat;
  document.getElementById('bMeaning').textContent=c.m;
  document.getElementById('bExample').innerHTML=c.ex;
  document.getElementById('bExampleKo').textContent='→ '+c.ko;
  isFlipped=false;
  const inner=document.getElementById('cardInner');
  // transition 끄고 즉시 앞면 — 카드 입장 애니메이션 끝난 후 다시 켜기
  inner.style.transition='none';
  inner.classList.remove('flipped','st-know','st-unknown');
  setTimeout(()=>{ inner.style.transition=''; }, 400);
  // 상태 테두리
  const st=results[ci];
  if(st===true)  inner.classList.add('st-know');
  else if(st===false) inner.classList.add('st-unknown');
  document.getElementById('counter').textContent=`${curIdx+1} / ${deck.length}`;
  if(anim){
    const w=document.getElementById('cardWrap');
    w.style.animation='none';
    requestAnimationFrame(()=>{ w.style.animation=''; w.style.animation='cardIn .3s ease'; });
  }
  updateProgress();
}

function handleCardTap(e){
  if(e.target.closest('.tts-btn')) return;
  flipCard();
}

function flipCard(){
  _sfx('flip');
  isFlipped=!isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped',isFlipped);
}

function animateCard(direction, callback){
  // direction: 'left' | 'right' | 'up-know' | 'up-unk'
  const w = document.getElementById('cardWrap');
  w.style.transition = 'transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.28s ease';
  if(direction==='left'){
    w.style.transform = 'translateX(-110%) rotate(-10deg)';
  } else if(direction==='right'){
    w.style.transform = 'translateX(110%) rotate(10deg)';
  } else if(direction==='up-know'){
    w.style.transform = 'translateX(80px) translateY(-40px) rotate(8deg) scale(0.9)';
  } else {
    w.style.transform = 'translateX(-80px) translateY(-40px) rotate(-8deg) scale(0.9)';
  }
  w.style.opacity = '0';
  setTimeout(()=>{
    w.style.transition = 'none';
    w.style.transform = '';
    w.style.opacity = '';
    callback();
    // 새 카드 들어오는 애니메이션
    requestAnimationFrame(()=>{
      w.style.transition='none';
      w.style.transform = direction==='left'?'translateX(60px) scale(0.94)':'translateX(-60px) scale(0.94)';
      w.style.opacity='0';
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          w.style.transition='transform 0.35s cubic-bezier(0.34,1.2,0.64,1), opacity 0.25s ease';
          w.style.transform='';
          w.style.opacity='1';
          setTimeout(()=>{ w.style.transition=''; },360);
        });
      });
    });
  }, 300);
}

function nextCard(){
  _sfx('swipe');
  if(curIdx<deck.length-1) animateCard('left', ()=>{ curIdx++; renderCard(false); savePos(); });
  else showSummary();
}
function prevCard(){
  _sfx('swipe');
  if(curIdx>0) animateCard('right', ()=>{ curIdx--; renderCard(false); savePos(); });
}

function markCard(knew){
  _sfx(knew?'complete':'review');
  const ci=deck[curIdx];
  results[ci]=knew; save(); updateProgress();
  // 학습 기록 저장
  saveLogEntry(ci, knew);
  const inner=document.getElementById('cardInner');
  inner.classList.remove('st-know','st-unknown');
  inner.classList.add(knew?'st-know':'st-unknown');
  animateCard(knew?'up-know':'up-unk', ()=>{
    if(curIdx<deck.length-1){ curIdx++; renderCard(false); savePos(); }
    else showSummary();
  });
}

// TTS — 오프라인 (Web Speech API)
// ═══════════════════════════════════════════════
let _voices = [];
function _loadVoices(){
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) {
    _voices = voices;
  }
}
if('speechSynthesis' in window){
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = _loadVoices;
  }
  _loadVoices();
}

function speak(text, btnEl){
  if(!('speechSynthesis' in window) || !text) return;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.tts-btn.speaking').forEach(b=>b.classList.remove('speaking'));

  const utt = new SpeechSynthesisUtterance(text);
  Object.assign(utt, { lang: 'en-US', rate: 0.88, pitch: 1.0 });

  const voice = _voices.find(v=>v.lang==='en-US' && v.localService)
             || _voices.find(v=>v.lang==='en-US')
             || null;
  if(voice) utt.voice = voice;

  if(btnEl){
    btnEl.classList.add('speaking');
    utt.onend   = ()=>btnEl.classList.remove('speaking');
    utt.onerror = ()=>btnEl.classList.remove('speaking');
  }
  window.speechSynthesis.speak(utt);
}

function speakFront(e){
  e.stopPropagation();
  const ci=deck[curIdx];
  speak(CARDS[ci].w, e.currentTarget);
}
function speakExample(e){
  e.stopPropagation();
  const ci=deck[curIdx];
  const plain=CARDS[ci].ex.replace(/<[^>]+>/g,'');
  speak(plain, e.currentTarget);
}

// ═══════════════════════════════════════════════
// SOUND FX (Web Audio API — 오프라인 작동)
// ═══════════════════════════════════════════════
const _sfxCtx = (()=>{
  try{ return new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; }
})();

function _sfx(type){
  if(!_sfxCtx) return;
  // 첫 인터랙션 후 AudioContext resume (모바일 정책)
  if(_sfxCtx.state==='suspended') _sfxCtx.resume();

  const ctx = _sfxCtx;
  const now = ctx.currentTime;

  switch(type){

    case 'swipe': {          // 카드 넘기기 — 평범한 버튼 클릭
      const o=ctx.createOscillator(); o.type='sine';
      o.frequency.setValueAtTime(600,now);
      o.frequency.exponentialRampToValueAtTime(300,now+0.06);
      const g=ctx.createGain();
      g.gain.setValueAtTime(0.18,now);
      g.gain.exponentialRampToValueAtTime(0.001,now+0.06);
      o.connect(g); g.connect(ctx.destination);
      o.start(now); o.stop(now+0.07);
      break;
    }

    case 'flip': {           // 카드 탭 — 아주 짧은 틱
      const len2 = ctx.sampleRate * 0.04;
      const buf2 = ctx.createBuffer(1, len2, ctx.sampleRate);
      const d2 = buf2.getChannelData(0);
      for(let i=0;i<d2.length;i++){
        const t = i/len2;
        const env = Math.exp(-t*18);
        d2[i] = (Math.random()*2-1) * env;
      }
      const src2 = ctx.createBufferSource(); src2.buffer=buf2;
      const bp2 = ctx.createBiquadFilter(); bp2.type='bandpass';
      bp2.frequency.value=3500; bp2.Q.value=1.5;
      const g2 = ctx.createGain(); g2.gain.value=0.45;
      src2.connect(bp2); bp2.connect(g2); g2.connect(ctx.destination);
      src2.start(now);
      break;
    }

    case 'complete': {       // 완료 — 맑은 짧은 딩
      [0,0.07].forEach((delay,i)=>{
        const o=ctx.createOscillator(); o.type='sine';
        o.frequency.value = i===0 ? 880 : 1100;
        const g=ctx.createGain(); g.gain.setValueAtTime(0,now+delay); g.gain.linearRampToValueAtTime(0.18,now+delay+0.01); g.gain.exponentialRampToValueAtTime(0.001,now+delay+0.22);
        o.connect(g); g.connect(ctx.destination);
        o.start(now+delay); o.stop(now+delay+0.25);
      });
      break;
    }

    case 'review': {         // 복습 — 낮은 톡
      const o=ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(320,now); o.frequency.exponentialRampToValueAtTime(180,now+0.09);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.2,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.09);
      o.connect(g); g.connect(ctx.destination);
      o.start(now); o.stop(now+0.1);
      break;
    }

    case 'tab': {            // 탭/버튼 클릭 — 미세한 틱
      const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=700;
      const g=ctx.createGain(); g.gain.setValueAtTime(0.08,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.05);
      o.connect(g); g.connect(ctx.destination);
      o.start(now); o.stop(now+0.05);
      break;
    }

    case 'open': {           // 단어장/팝업 열기 — 부드러운 스윕 업
      const o=ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(400,now); o.frequency.exponentialRampToValueAtTime(700,now+0.1);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.1,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
      o.connect(g); g.connect(ctx.destination);
      o.start(now); o.stop(now+0.12);
      break;
    }

  }
}

// PROGRESS
// ═══════════════════════════════════════════════
function updateProgress(){
  const know=deck.filter(i=>results[i]===true).length;
  const unk=deck.filter(i=>results[i]===false).length;
  const reviewed=know+unk;
  const pct=deck.length?Math.round(reviewed/deck.length*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('knowCnt').textContent=know;
  document.getElementById('unkCnt').textContent=unk;
  document.getElementById('remainCnt').textContent=deck.length-reviewed;
  const lvLabel=curLevel==='all'?`전체 ${deck.length}개`:`LV.${curLevel} — ${deck.length}개`;
  document.getElementById('progLabel').textContent=lvLabel;
}

// 2단계 초기화 확인 (#5)
let resetStage=0, resetTimer=null;
function handleResetPress(){
  if(resetStage===0){
    resetStage=1;
    showToast('⚠️ 한 번 더 누르면 초기화돼요');
    resetTimer=setTimeout(()=>{ resetStage=0; },3000);
  } else if(resetStage===1){
    clearTimeout(resetTimer);
    resetStage=2;
    showToast('🚨 진짜요? 한 번 더 누르면 초기화!');
    resetTimer=setTimeout(()=>{ resetStage=0; },3000);
  } else {
    clearTimeout(resetTimer);
    resetStage=0;
    results={}; save(); buildDeck(); renderCard(true);
    updateStreak(false);
    showToast('↺ 초기화 완료');
  }
}

// 학습 기록 (날짜별)
// ═══════════════════════════════════════════════
let _logTab='today';

function _todayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Firebase용 임시 저장소 (loadData에서 채워짐)
let _fbStreak = {days:0, last:''};
let _fbLog    = {};

function saveLogEntry(cardIdx, knew){
  const today=_todayKey();
  if(!_fbLog[today]) _fbLog[today]={done:[],review:[]};
  const list=knew?_fbLog[today].done:_fbLog[today].review;
  if(!list.includes(cardIdx)) list.push(cardIdx);
  const other=knew?_fbLog[today].review:_fbLog[today].done;
  const oi=other.indexOf(cardIdx);
  if(oi>=0) other.splice(oi,1);
  _fbSave({ log: _fbLog });
}

function openStudyLog(){
  _sfx('open');
  _logTab='today';
  document.querySelectorAll('.log-tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  renderLog();
  document.getElementById('logOv').classList.add('open');
}
function closeStudyLog(){
  document.getElementById('logOv').classList.remove('open');
}
function setLogTab(t){
  _logTab=t;
  document.querySelectorAll('.log-tab').forEach((tab,i)=>
    tab.classList.toggle('active',['today','all'][i]===t));
  renderLog();
}

function renderLog(){
  const list=document.getElementById('logList');
  const log=_fbLog;
  const today=_todayKey();
  const lvNames=['','기초','초중급','중급','고급'];

  let days=Object.keys(log).sort((a,b)=>b.localeCompare(a)); // 최신순
  if(_logTab==='today') days=days.filter(d=>d===today);

  if(days.length===0){
    list.innerHTML=`<div class="log-empty">📚 아직 학습 기록이 없어요.<br>카드를 완료하면 기록이 남아요!</div>`;
    return;
  }

  list.innerHTML=days.map(day=>{
    const d=log[day];
    const doneCount=d.done.length;
    const revCount=d.review.length;
    const isToday=day===today;
    const label=isToday?'오늘':day;

    const doneWords=d.done.map(i=>CARDS[i]?
      `<span class="log-word know" onclick="logWordToVocab(${i})" style="cursor:pointer">${CARDS[i].w}</span>`:'').join('');
    const revWords=d.review.map(i=>CARDS[i]?
      `<span class="log-word unk" onclick="logWordToVocab(${i})" style="cursor:pointer">${CARDS[i].w}</span>`:'').join('');

    return `<div class="log-day">
      <div class="log-day-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <div class="log-day-date">${isToday?'📅 오늘 ('+day+')':day}</div>
        <div class="log-day-stats">
          <span class="log-stat-done">✓ ${doneCount}</span>
          <span class="log-stat-rev">✗ ${revCount}</span>
        </div>
      </div>
      <div class="log-day-body ${isToday?'open':''}">
        ${doneCount>0?`<div class="log-section-title">✓ 완료 ${doneCount}개</div>
        <div class="log-word-list">${doneWords}</div>`:''}
        ${revCount>0?`<div class="log-section-title">✗ 복습 ${revCount}개</div>
        <div class="log-word-list">${revWords}</div>`:''}
        ${doneCount===0&&revCount===0?'<div style="color:var(--dim);font-size:13px;">기록 없음</div>':''}
      </div>
    </div>`;
  }).join('');
}

// 백업에 로그도 포함

function exportCSVAndOpenDrive(){
  const lvNames=['','기초','초중급','중급','고급'];
  const items=CARDS.map((c,i)=>({c,i})).filter(({i})=>results[i]===false);

  if(items.length===0){ showToast('복습할 단어가 없어요!'); return; }

  const rows=[['구동사','뜻','예문','한국어 해석','레벨','카테고리']];
  items.forEach(({c})=>{
    const ex=c.ex.replace(/<[^>]+>/g,'');
    rows.push([c.w, c.m, ex, c.ko, `LV.${c.lv} ${lvNames[c.lv]}`, c.cat]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`PhrasalFlip_복습_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);

  // CSV 저장 후 잠깐 뒤 구글 드라이브 앱 열기
  showToast(`⬇ ${items.length}개 저장 중... 드라이브 앱으로 이동해요!`);
  setTimeout(()=>{
    // Android 구글 드라이브 앱 딥링크
    window.location.href='googledrive://';
  }, 1500);
}

function exportCSV(){
  const lvNames=['','기초','초중급','중급','고급'];

  // 항상 복습(false) 단어만 내보내기
  const items=CARDS.map((c,i)=>({c,i})).filter(({i})=>results[i]===false);

  if(items.length===0){
    showToast('복습할 단어가 없어요!');
    return;
  }

  const rows=[['구동사','뜻','예문','한국어 해석','레벨','카테고리']];
  items.forEach(({c})=>{
    const ex = c.ex.replace(/<[^>]+>/g,'');
    rows.push([c.w, c.m, ex, c.ko, `LV.${c.lv} ${lvNames[c.lv]}`, c.cat]);
  });

  const csv = rows.map(row=>
    row.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(',')
  ).join('\n');

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `PhrasalFlip_복습_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`⬇ 복습 단어 ${items.length}개 저장 완료!`);
}


function copyToClipboard(){
  const lvNames=['','기초','초중급','중급','고급'];
  const items=CARDS.map((c,i)=>({c,i})).filter(({i})=>results[i]===false);

  if(items.length===0){ showToast('복습할 단어가 없어요!'); return; }

  // 탭 구분자 — 구글 시트 붙여넣기 최적화
  const header='구동사\t뜻\t예문\t한국어 해석\t레벨\t카테고리';
  const rows=items.map(({c})=>{
    const ex=c.ex.replace(/<[^>]+>/g,'');
    return [c.w, c.m, ex, c.ko, `LV.${c.lv} ${lvNames[c.lv]}`, c.cat].join('\t');
  });
  const text=[header,...rows].join('\n');

  navigator.clipboard.writeText(text).then(()=>{
    showToast(`📋 ${items.length}개 복사! 구글 시트에 붙여넣기 하세요.`);
  }).catch(()=>{
    showToast('복사 실패 — CSV로 저장해주세요.');
  });
}

function importBackup(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try{
      const data = JSON.parse(ev.target.result);
      if(data.results) results   = data.results;
      if(data.posmap)  posMap    = data.posmap;
      if(data.streak)  _fbStreak = data.streak;
      if(data.log)     _fbLog    = data.log;
      // Firebase에 즉시 저장
      await _fbSave({ results, posMap, streak:_fbStreak, log:_fbLog });
      buildDeck(); renderCard(false); loadStreak();
      showToast('✅ 복원 완료! 데이터가 돌아왔어요.');
      closeSettings();
    } catch(err){
      showToast('❌ 파일이 올바르지 않아요.');
    }
  };
  reader.readAsText(file);
  e.target.value=''; // 같은 파일 재선택 가능하게
}


function loadStreak(){
  const today=new Date().toDateString();
  const s=_fbStreak;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(s.last!==today && s.last!==yesterday) s.days=0;
  document.getElementById('streakDays').textContent=s.days;
  return s;
}

function updateStreak(increment){
  const today=new Date().toDateString();
  const s=_fbStreak;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(increment){
    if(s.last!==today){
      s.days = (s.last===yesterday) ? s.days+1 : 1;
      s.last=today;
      _fbSave({ streak: s });
    }
  } else {
    s.days=0; s.last='';
    _fbSave({ streak: s });
  }
  document.getElementById('streakDays').textContent=s.days;
  return s.days;
}

function openSettings(){

  const sheet=document.getElementById('settSheet');
  let sy=0;
  sheet.ontouchstart=e=>{ sy=e.touches[0].clientY; };
  sheet.ontouchmove=e=>{
    const dy=e.touches[0].clientY-sy;
    if(dy>0){ sheet.style.transform=`translateY(${dy}px)`; sheet.style.transition='none'; }
  };
  sheet.ontouchend=e=>{
    const dy=e.changedTouches[0].clientY-sy;
    if(dy>80){
      // 부드럽게 밀려 내려가며 닫히기
      sheet.style.transition='transform 0.35s cubic-bezier(0.4,0,1,1)';

      setTimeout(()=>{
        sheet.style.transition='';
        sheet.style.transform='';
        closeSettings();
      }, 340);
    } else {
      // 제자리로 스냅백
      sheet.style.transition='transform 0.3s cubic-bezier(0.4,0,0.2,1)';
      sheet.style.transform='';
      setTimeout(()=>{ sheet.style.transition=''; }, 300);

// SWIPE — 제스처 감지 후 버튼과 동일한 애니메이션
// ═══════════════════════════════════════════════
(function(){
  let startX=0, startY=0;

  document.addEventListener('touchstart', e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, {passive:true});

  document.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if(Math.abs(dy) > Math.abs(dx)) return; // 세로 스크롤 무시
    if(Math.abs(dx) < 50) return; // 너무 짧은 스와이프 무시

    // 카드 영역에서 시작했는지 확인
    const r = document.getElementById('cardWrap').getBoundingClientRect();
    if(startX < r.left || startX > r.right || startY < r.top || startY > r.bottom) return;

    if(dx < 0) nextCard();   // 왼쪽 → 다음
    else        prevCard();  // 오른쪽 → 이전
  }, {passive:true});
})();

function renderVocab(){
  const list=document.getElementById('vocabList');
  const lvNames=['','기초','초중급','중급','고급'];
  const hidden=_hideMeaning?'visibility:hidden;':'';

  let items=CARDS.map((c,i)=>({c,i}));
  if(vLevel!=='all') items=items.filter(({c})=>String(c.lv)===vLevel);
  if(vFilter==='know')    items=items.filter(({i})=>results[i]===true);
  if(vFilter==='unknown') items=items.filter(({i})=>results[i]===false);
  if(vFilter==='none')    items=items.filter(({i})=>results[i]===undefined);

  // 검색 필터
  const q=(document.getElementById('vocabSearch')?.value||'').trim().toLowerCase();
  if(q) items=items.filter(({c})=>
    c.w.toLowerCase().includes(q)||c.m.toLowerCase().includes(q)
  );

  document.getElementById('vocabCount').textContent=`${items.length}개의 단어`;

  if(items.length===0){
    list.innerHTML='<div style="text-align:center;padding:50px 0;color:var(--dim);font-size:14px;">해당 단어가 없어요</div>';
    return;
  }

  list.innerHTML=items.map(({c,i}, idx)=>{
    const st=results[i];
    const stClass=st===true?'know':st===false?'unknown':'none';
    const stIcon=st===true?'✓':st===false?'✗':'○';
    const stLabel=st===true?'완료':st===false?'복습':'미확인';
    const displayNum=idx+1; // 필터된 목록에서의 순번
    return `
    <div class="vcard status-${stClass}" id="vcard-${i}">
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;">
        <button class="vstatus ${stClass}" onclick="cycleStatus(${i})" title="탭해서 상태 변경">${stIcon}</button>
        <span class="vstatus-tooltip">${stLabel}</span>
      </div>
      <div class="vbody">
        <div class="vword-row">
          <div class="vword"><span class="vword-num">${displayNum}</span>${c.w}</div>
          <div class="vlv-chip" data-lv="${c.lv}">LV.${c.lv} ${lvNames[c.lv]}</div>
          <div class="vcat">#${c.cat}</div>
        </div>
        <div class="vmeaning" style="${hidden}">${c.m}</div>
        <div class="vex" style="${hidden}">${c.ex}</div>
        <div class="vex-ko" style="${hidden}">→ ${c.ko}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;">
        <button class="vspeakbtn" onclick="speak('${c.w.replace(/'/g,"\\'")}',this)" title="발음 듣기">🔊</button>
        <button class="vstart-btn" onclick="jumpToCard(${i})" title="이 단어부터 시작">▶ 시작</button>
      </div>
    </div>`;
  }).join('');
}

function cycleStatus(idx){
  const cur = results[idx];
  let next;
  if(cur === undefined)  next = true;   // 미확인 → 완료
  else if(cur === true)  next = false;  // 완료 → 복습
  else                   next = undefined; // 복습 → 미확인

  if(next === undefined) delete results[idx];
  else results[idx] = next;
  save();
  updateProgress();

  // 해당 카드만 UI 업데이트 (전체 재렌더 없이)
  const card = document.getElementById(`vcard-${idx}`);
  if(!card) return;
  const stClass = next===true?'know':next===false?'unknown':'none';
  const stIcon  = next===true?'✓':next===false?'✗':'○';
  const stLabel = next===true?'완료':next===false?'복습':'미확인';
  const btn = card.querySelector('.vstatus');
  const tip = card.querySelector('.vstatus-tooltip');
  btn.className = `vstatus ${stClass}`;
  btn.textContent = stIcon;
  tip.textContent = stLabel;
  card.className = `vcard status-${stClass}`;

  // 필터가 걸려 있으면 해당 카드 숨기기
  if(vFilter !== 'all'){
    const shouldShow =
      (vFilter==='know'    && next===true) ||
      (vFilter==='unknown' && next===false)||
      (vFilter==='none'    && next===undefined);
    if(!shouldShow){
      card.style.transition = 'opacity .3s, transform .3s';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.95)';
      setTimeout(()=>{ card.remove(); renderVocabHeader(); }, 280);
    }
  }
  renderVocabHeader();
}

    `<span class="vhs-chip unk">✗ 복습 ${totalUnk}</span>`+
    `<span class="vhs-chip none">○ 미확인 ${totalNone}</span>`;
}

const _fbTimeout = setTimeout(()=>{
  if(!window._fbUid){
    document.getElementById('fbLoading')?.remove();
    buildDeck(); renderCard(false); loadStreak();
  }
}, 3000);

// ── Service Worker 등록 (PWA 오프라인 지원) ──
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='phrasalflip-v1';
    const ASSETS=['/'];
    self.addEventListener('install', e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate', e=>{
      e.waitUntil(caches.keys().then(keys=>
        Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e=>{
      e.respondWith(
        caches.match(e.request).then(cached=>cached||fetch(e.request).catch(()=>cached))
      );
    });
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
